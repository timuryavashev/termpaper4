{% extends 'mailing/base.html' %}

{% block title %}Клиент{% endblock %}

{% block content %}

<div class="pricing-header px-3 py-3 pt-md-5 pb-md-4 mx-auto text-center">
    <h1 class="display-4">Информация о клиенте</h1>
</div>

<div class="container">

    <div class="row">
        <div class="col-9">
            <p>{{ subscriber.full_name }}</p>
            <p>{{ subscriber.email }}</p>
            <p>{{ subscriber.comment }}</p>
        </div>
        <div class="col-3">
            <a href="{% url 'mailing:subscriber_update' subscriber.pk %}" class="btn btn-secondary">Редактировать</a>
            <a href="{% url 'mailing:subscriber_delete' subscriber.pk %}" class="btn btn-danger">Удалить</a>
        </div>


    </div>
    <a type="button" class="btn btn-lg btn-block btn-outline-primary" href="{% url 'mailing:subscribers_list' %}">Назад</a>
</div>
{% endblock %}
