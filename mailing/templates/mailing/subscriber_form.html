{% extends 'mailing/base.html' %}

{% block title %}{% if object %}Редактирование клиента{% else %}Новый клиент{% endif %}{% endblock %}

{% block content %}


<div class="container">
  <h1 class="mb-4">{% if object %}Редактирование клиента{% else %}Новый клиент{% endif %}</h1>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="{% if object %}{% url 'mailing:subscriber_detail' subscriber.pk %}{% else %}{% url 'mailing:subscribers_list' %}{% endif %}"  class="btn btn-secondary">Отмена</a>
  </form>
</div>
{% endblock %}
