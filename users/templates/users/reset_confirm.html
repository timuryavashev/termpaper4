{% extends 'mailing/base.html' %}

{% block title %}Восстановление пароля{% endblock %}

{% block content %}


<div class="container">
    <h1 class="mb-4">Восстановление пароля</h1>

    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
    </div>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <input type="password" name="password1" placeholder="Новый пароль" required>
        <input type="password" name="password2" placeholder="Подтвердите пароль" required>
        <button type="submit">Изменить пароль</button>
    </form>
</div>
{% endblock %}
