{% extends 'mailing/base.html' %}

{% block title %}Клиент{% endblock %}

{% block content %}


<div class="container">
  <h3 class="mb-4">Вы действительно хотите удалить рассылку "{{ sending.message }}"?</h3>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Удалить</button>
    <a href="{% url 'mailing:sending_detail' sending.pk %}" class="btn btn-secondary">Отмена</a>
  </form>
</div>
{% endblock %}
